<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>صندوقي اليومي</title>

  <!-- PWA basics -->
  <link rel="manifest" href="data:application/manifest+json,{
    'name': 'صندوقي اليومي',
    'short_name': 'صندوقي',
    'start_url': '.',
    'display': 'standalone',
    'background_color': '#020617',
    'theme_color': '#10b981',
    'icons': [
      {'src': 'https://img.icons8.com/fluency/192/money-bag.png', 'sizes': '192x192', 'type': 'image/png'},
      {'src': 'https://img.icons8.com/fluency/512/money-bag.png', 'sizes': '512x512', 'type': 'image/png'}
    ]
  }">

  <meta name="theme-color" content="#10b981">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap');

    body {
      font-family: 'Cairo', system-ui, sans-serif;
      background: linear-gradient(to bottom, #0f172a, #020617);
      color: white;
      min-height: 100vh;
      margin: 0;
    }

    .number {
      font-size: clamp(3.8rem, 14vw, 7rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .force-latin-digits {
      font-variant-numeric: tabular-nums;
      direction: ltr;
      display: inline-block;
      unicode-bidi: embed;
    }

    .toast {
      animation: toast-in 0.4s ease-out forwards;
    }

    @keyframes toast-in {
      from { transform: translate(-50%, 120%); opacity: 0; }
      to   { transform: translate(-50%, 0); opacity: 1; }
    }

    input[type=number], input[type=date] {
      -webkit-appearance: textfield;
      appearance: textfield;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    @media print {
      body * { visibility: hidden; }
      #printArea, #printArea * { visibility: visible; }
      #printArea { position: absolute; left: 0; top: 0; width: 100%; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="pb-24 pt-6 px-4 sm:px-6">

  <div class="max-w-lg mx-auto">

    <!-- Header -->
    <header class="flex items-center justify-between mb-10 no-print">
      <div class="flex items-center gap-3">
        <div class="w-14 h-14 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl flex items-center justify-center text-4xl shadow-xl shadow-emerald-600/40">
          💰
        </div>
        <div>
          <h1 class="text-4xl font-black tracking-tight">صندوقي</h1>
          <p class="text-emerald-400/90 text-base">+1500 يومياً</p>
        </div>
      </div>
      <button onclick="resetAll()" class="text-red-400/70 hover:text-red-400 flex items-center gap-2 text-sm">
        <i class="fa-solid fa-rotate-right"></i>
        إعادة تعيين
      </button>
    </header>

    <!-- Balance Card -->
    <section id="balanceCard" class="rounded-3xl p-10 text-center shadow-2xl border border-white/5 relative overflow-hidden mb-12 transition-all duration-500">
      <div id="glow" class="absolute inset-0 pointer-events-none opacity-30"></div>
      <div class="relative z-10">
        <p class="text-zinc-400 text-base mb-2">الرصيد الحالي</p>
        <div id="balance" class="number font-black text-white force-latin-digits">0</div>
        <p class="text-sm text-zinc-500 mt-2">وحدة</p>
        <div id="statusBadge" class="mt-8 inline-flex items-center gap-2 px-8 py-3 rounded-full text-base font-medium"></div>
      </div>
    </section>

    <!-- Add / Subtract Form -->
    <section class="bg-zinc-900/70 border border-zinc-800 rounded-3xl p-8 shadow-xl mb-12 no-print">
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
        <i class="fa-solid fa-file-invoice-dollar text-amber-400"></i>
        عملية جديدة
      </h2>
      <div class="space-y-6">
        <div>
          <label class="block text-zinc-300 mb-2 text-lg">الوصف</label>
          <input id="desc" type="text" placeholder="راتب • فاتورة • بنزين ..." class="w-full bg-zinc-800/60 border border-zinc-700 focus:border-emerald-500 rounded-2xl px-5 py-4 text-lg outline-none transition-all">
        </div>
        <div>
          <label class="block text-zinc-300 mb-2 text-lg">المبلغ</label>
          <div class="relative">
            <input id="amount" type="number" placeholder="0" class="w-full bg-zinc-800/60 border border-zinc-700 focus:border-emerald-500 rounded-2xl px-5 py-6 text-5xl font-bold text-center outline-none transition-all force-latin-digits">
            <div class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none">وحدة</div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-5 pt-4">
          <button onclick="addOperation(true)" class="bg-gradient-to-r from-red-600 to-rose-700 hover:from-red-700 hover:to-rose-800 py-5 rounded-2xl font-bold text-xl shadow-lg shadow-red-700/30 active:scale-95 transition flex items-center justify-center gap-3">
            <i class="fa-solid fa-minus"></i> خصم
          </button>
          <button onclick="addOperation(false)" class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 py-5 rounded-2xl font-bold text-xl shadow-lg shadow-emerald-600/30 active:scale-95 transition flex items-center justify-center gap-3">
            <i class="fa-solid fa-plus"></i> إيداع
          </button>
        </div>
      </div>
    </section>

    <!-- Report Section -->
    <section class="bg-zinc-900/70 border border-zinc-800 rounded-3xl p-8 shadow-xl mb-12">
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3 no-print">
        <i class="fa-solid fa-chart-line text-blue-400"></i>
        تقرير الفترة
      </h2>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-6 no-print">
        <div>
          <label class="block text-zinc-300 mb-2">من تاريخ</label>
          <input type="date" id="dateFrom" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white">
        </div>
        <div>
          <label class="block text-zinc-300 mb-2">إلى تاريخ</label>
          <input type="date" id="dateTo" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white">
        </div>
        <div class="flex items-end">
          <button onclick="showReport()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition">
            <i class="fa-solid fa-file-lines"></i> عرض التقرير
          </button>
        </div>
      </div>

      <div id="printArea" class="hidden bg-white text-black p-6 rounded-xl shadow-inner" dir="rtl">
        <div id="reportContent"></div>
        <div class="mt-10 text-center no-print">
          <button onclick="window.print()" class="bg-green-600 hover:bg-green-700 text-white px-10 py-4 rounded-xl font-bold text-lg shadow-lg transition flex items-center justify-center gap-3 mx-auto">
            <i class="fa-solid fa-print"></i> طباعة التقرير
          </button>
        </div>
      </div>
    </section>

    <!-- History -->
    <section class="no-print">
      <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3 px-1">
        <i class="fa-solid fa-clock-rotate-left text-blue-400"></i>
        سجل العمليات
      </h2>
      <div id="historyList" class="space-y-4 max-h-[40vh] overflow-y-auto pr-2 pb-4"></div>
    </section>

  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-4 rounded-2xl text-white font-medium shadow-2xl flex items-center gap-3 z-50 min-w-[300px] justify-center no-print">
    <i class="fa-solid fa-circle-check text-xl"></i>
    <span id="toastMsg"></span>
  </div>

<script>
// ────────────────────────────────────────────────
let balance = 0;
let lastDay = new Date().toISOString().slice(0,10);
let records = [];

const STORAGE_KEY = "myDailyBox-v2026-debt";

function $(id) { return document.getElementById(id); }

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      balance = Number(data.balance) || 0;
      lastDay = data.lastDay || lastDay;
      records = Array.isArray(data.records) ? data.records : [];
    } catch(e) {}
  }
  applyDailyBonus();
  renderAll();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({balance, lastDay, records}));
}

function applyDailyBonus() {
  const today = new Date().toISOString().slice(0,10);
  if (lastDay === today) return;

  const prev = new Date(lastDay);
  const curr = new Date(today);
  const diff = Math.floor((curr - prev) / 864e5);

  if (diff > 0) {
    const bonus = diff * 1500;
    balance += bonus;
    showToast(`+${bonus.toLocaleString('en-US')} (${diff} يوم)`, false, true);
  }

  lastDay = today;
  saveData();
}

function updateBalanceUI() {
  const displayValue = balance.toLocaleString('en-US');
  $('balance').textContent = displayValue;

  let gradient, statusText, badgeClass;

  if (balance >= 40000) {
    gradient = "from-emerald-700 to-emerald-500";
    statusText = "ممتاز";
    badgeClass = "bg-emerald-600/40 text-emerald-100 border border-emerald-500/50";
  }
  else if (balance >= 20000) {
    gradient = "from-emerald-600 to-emerald-400";
    statusText = "جيد جداً";
    badgeClass = "bg-emerald-500/30 text-emerald-100 border border-emerald-400/40";
  }
  else if (balance >= 8000) {
    gradient = "from-amber-600 to-amber-400";
    statusText = "متوسط";
    badgeClass = "bg-amber-500/30 text-amber-100 border border-amber-400/40";
  }
  else if (balance >= 0) {
    gradient = "from-red-700 to-red-500";
    statusText = "منخفض";
    badgeClass = "bg-red-600/40 text-red-100 border border-red-500/50";
  }
  else {
    // الرصيد سالب → دين
    gradient = "from-rose-900 to-rose-700";
    statusText = "في دين";
    badgeClass = "bg-rose-800/60 text-rose-100 border border-rose-600 animate-pulse";
  }

  $('balanceCard').style.background = `linear-gradient(135deg, ${gradient})`;
  $('glow').style.background = balance < 0 
    ? `radial-gradient(circle at 50% 30%, rgba(244,63,94,0.35), transparent 70%)`
    : `radial-gradient(circle at 50% 30%, rgba(255,255,255,0.15), transparent 70%)`;

  $('statusBadge').textContent = statusText;
  $('statusBadge').className = `mt-8 inline-flex items-center gap-2 px-8 py-3 rounded-full text-base font-medium ${badgeClass}`;
}

function renderHistory() {
  const cont = $('historyList');
  cont.innerHTML = records.length ? "" : '<div class="text-center py-16 text-zinc-600 text-lg">لا توجد عمليات بعد...</div>';

  records.forEach((op, i) => {
    const isIncome = op.type === "income";
    const div = document.createElement("div");
    div.className = `flex justify-between items-center bg-zinc-900/60 border ${isIncome ? 'border-emerald-900/40' : 'border-red-900/40'} rounded-2xl p-5`;
    div.innerHTML = `
      <div class="flex-1">
        <div class="font-medium text-lg ${isIncome ? 'text-emerald-300' : 'text-red-300'}">${op.desc || 'بدون وصف'}</div>
        <div class="text-sm text-zinc-500 mt-1">${op.date}</div>
      </div>
      <div class="text-right force-latin-digits">
        <div class="text-3xl font-bold ${isIncome ? 'text-emerald-400' : 'text-red-400'}">
          ${isIncome ? '+' : '-'} ${op.amount.toLocaleString('en-US')}
        </div>
        <button onclick="deleteOp(${i})" class="mt-2 text-xs text-zinc-600 hover:text-red-400">حذف</button>
      </div>
    `;
    cont.prepend(div);
  });
}

function renderAll() {
  updateBalanceUI();
  renderHistory();
}

function addOperation(isExpense) {
  const desc = $('desc').value.trim();
  const amount = Number($('amount').value);

  if (!desc) return highlight($('desc'));
  if (!amount || amount <= 0) return highlight($('amount'));

  // لم نعد نمنع الخصم إذا كان أكبر من الرصيد
  // سيصبح الرصيد سالبًا ويظهر كدين

  const dateStr = new Date().toLocaleString('ar-EG', {
    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
  });

  records.unshift({
    type: isExpense ? "expense" : "income",
    amount,
    desc,
    date: dateStr
  });

  balance += isExpense ? -amount : amount;

  saveData();
  renderAll();

  $('desc').value = "";
  $('amount').value = "";

  showToast(isExpense 
    ? `تم خصم ${amount.toLocaleString('en-US')} ✓` 
    : `تم إيداع ${amount.toLocaleString('en-US')} ✓`);
}

function deleteOp(index) {
  if (!confirm("حذف العملية؟")) return;
  const op = records[index];
  balance += op.type === "income" ? -op.amount : op.amount;
  records.splice(index, 1);
  saveData();
  renderAll();
  showToast("تم الحذف وتصحيح الرصيد");
}

function highlight(el) {
  el.classList.add('!border-red-500', '!ring-2', '!ring-red-500/40');
  setTimeout(() => el.classList.remove('!border-red-500', '!ring-2', '!ring-red-500/40'), 1800);
  el.focus();
}

function showToast(message, isError = false, isImportant = false) {
  const toast = $('toast');
  const msg = $('toastMsg');
  msg.textContent = message;
  toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-4 rounded-2xl text-white font-medium shadow-2xl flex items-center gap-3 z-50 ${isError ? 'bg-rose-700' : 'bg-emerald-600'} ${isImportant ? '!bg-amber-600' : ''}`;
  toast.classList.remove('hidden');
  setTimeout(() => {
    toast.classList.add('opacity-0', 'translate-y-6');
    setTimeout(() => toast.classList.add('hidden'), 400);
  }, 3500);
}

function resetAll() {
  if (!confirm("مسح كل البيانات نهائياً؟")) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function showReport() {
  const from = $('dateFrom').value;
  const to = $('dateTo').value;
  if (!from || !to) return showToast("حدد التاريخين", true);

  const start = new Date(from);
  const end = new Date(to); end.setHours(23,59,59,999);

  const filtered = records.filter(r => {
    const d = new Date(r.date.split(',')[0].split('/').reverse().join('-'));
    return d >= start && d <= end;
  }).sort((a,b) => new Date(b.date) - new Date(a.date));

  let html = filtered.length ? '' : '<p class="text-center text-xl text-gray-600 py-12">لا توجد عمليات في الفترة المحددة</p>';

  if (filtered.length) {
    let totalIn = 0, totalOut = 0;
    html = `
      <h2 class="text-2xl font-bold text-center mb-6">تقرير الصندوق<br><small class="text-gray-600">${from} ← ${to}</small></h2>
      <table class="w-full border-collapse text-sm mb-8">
        <thead><tr class="bg-gray-200"><th class="p-3 border">التاريخ</th><th class="p-3 border">الوصف</th><th class="p-3 border text-right">إيداع</th><th class="p-3 border text-right">خصم</th></tr></thead>
        <tbody>
    `;
    filtered.forEach(op => {
      const isIn = op.type === "income";
      if (isIn) totalIn += op.amount; else totalOut += op.amount;
      html += `<tr class="border-b hover:bg-gray-50"><td class="p-3 border">${op.date}</td><td class="p-3 border">${op.desc||'-'}</td><td class="p-3 border text-right ${isIn?'text-green-700 font-medium':''}">${isIn?op.amount.toLocaleString('en-US'):'-'}</td><td class="p-3 border text-right ${!isIn?'text-red-700 font-medium':''}">${!isIn?op.amount.toLocaleString('en-US'):'-'}</td></tr>`;
    });
    html += `</tbody></table>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 text-center">
      <div class="p-5 bg-green-50 rounded-xl"><div class="text-green-700">إجمالي الإيداعات</div><div class="text-3xl font-bold text-green-700">${totalIn.toLocaleString('en-US')}</div></div>
      <div class="p-5 bg-red-50 rounded-xl"><div class="text-red-700">إجمالي المصروفات</div><div class="text-3xl font-bold text-red-700">${totalOut.toLocaleString('en-US')}</div></div>
      <div class="p-5 bg-blue-50 rounded-xl"><div class="text-blue-700">الصافي</div><div class="text-3xl font-bold ${totalIn-totalOut>=0?'text-green-700':'text-red-700'}">${(totalIn-totalOut).toLocaleString('en-US')}</div></div>
    </div>`;
  }

  $('reportContent').innerHTML = html;
  $('printArea').classList.remove('hidden');
}

// ────────────────────────────────────────────────
window.addEventListener('load', loadData);
$('amount').addEventListener('keypress', e => { if (e.key === 'Enter') addOperation(true); });
</script>

</body>
</html>
