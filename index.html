<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>صندوقي اليومي</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" href="favicon.ico">

  <meta name="theme-color" content="#10b981">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap');

    body {
      font-family: 'Cairo', system-ui, sans-serif;
      background: linear-gradient(to bottom, #0f172a, #020617);
      color: white;
      min-height: 100vh;
      margin: 0;
    }

    .number { font-size: clamp(3.8rem, 14vw, 7rem); line-height: 1; font-weight: 900; letter-spacing: -0.05em; }
    .force-latin-digits { font-variant-numeric: tabular-nums; direction: ltr; display: inline-block; unicode-bidi: embed; }

    .toast { animation: toast-in 0.4s ease-out forwards; }
    @keyframes toast-in { from { transform: translate(-50%, 120%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

    input[type=number], input[type=date] { -webkit-appearance: textfield; appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    @media print {
      body * { visibility: hidden; }
      #printArea, #printArea * { visibility: visible; }
      #printArea { position: absolute; left: 0; top: 0; width: 100%; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="pb-24 pt-6 px-4 sm:px-6">

<div class="max-w-lg mx-auto">

  <!-- Header -->
  <header class="flex items-center justify-between mb-10 no-print">
    <div class="flex items-center gap-3">
      <div class="w-14 h-14 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl flex items-center justify-center text-4xl shadow-xl shadow-emerald-600/40">💰</div>
      <div>
        <h1 class="text-4xl font-black tracking-tight">صندوقي</h1>
        <p class="text-emerald-400/90 text-base">+1500 يومياً</p>
      </div>
    </div>
    <button onclick="location.reload()" class="text-blue-400/70 hover:text-blue-400 flex items-center gap-2 text-sm no-print">
      <i class="fa-solid fa-rotate-right"></i> تحديث
    </button>
  </header>

  <!-- Balance Card -->
  <section id="balanceCard" class="rounded-3xl p-10 text-center shadow-2xl border border-white/5 relative overflow-hidden mb-12 transition-all duration-500">
    <div id="glow" class="absolute inset-0 pointer-events-none opacity-30"></div>
    <div class="relative z-10">
      <p class="text-zinc-400 text-base mb-2">الرصيد الحالي (من الشيت)</p>
      <div id="balance" class="number font-black text-white force-latin-digits">0</div>
      <p class="text-sm text-zinc-500 mt-2">وحدة</p>
      <div id="statusBadge" class="mt-8 inline-flex items-center gap-2 px-8 py-3 rounded-full text-base font-medium"></div>
    </div>
  </section>

  <!-- Add Operation -->
  <section class="bg-zinc-900/70 border border-zinc-800 rounded-3xl p-8 shadow-xl mb-12 no-print">
    <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3">
      <i class="fa-solid fa-file-invoice-dollar text-amber-400"></i> عملية جديدة
    </h2>
    <div class="space-y-6">
      <div>
        <label class="block text-zinc-300 mb-2 text-lg">الوصف</label>
        <input id="desc" type="text" placeholder="راتب • فاتورة • بنزين ..." class="w-full bg-zinc-800/60 border border-zinc-700 focus:border-emerald-500 rounded-2xl px-5 py-4 text-lg outline-none transition-all">
      </div>
      <div>
        <label class="block text-zinc-300 mb-2 text-lg">المبلغ</label>
        <div class="relative">
          <input id="amount" type="number" min="1" step="1" placeholder="0" class="w-full bg-zinc-800/60 border border-zinc-700 focus:border-emerald-500 rounded-2xl px-5 py-6 text-5xl font-bold text-center outline-none transition-all force-latin-digits">
          <div class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none">وحدة</div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-5 pt-4">
        <button onclick="addOperation(true)" class="bg-gradient-to-r from-red-600 to-rose-700 hover:from-red-700 hover:to-rose-800 py-5 rounded-2xl font-bold text-xl shadow-lg shadow-red-700/30 active:scale-95 transition flex items-center justify-center gap-3">
          <i class="fa-solid fa-minus"></i> خصم
        </button>
        <button onclick="addOperation(false)" class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 py-5 rounded-2xl font-bold text-xl shadow-lg shadow-emerald-600/30 active:scale-95 transition flex items-center justify-center gap-3">
          <i class="fa-solid fa-plus"></i> إيداع
        </button>
      </div>
    </div>
  </section>

  <!-- Report Section -->
  <section class="bg-zinc-900/70 border border-zinc-800 rounded-3xl p-8 shadow-xl mb-12">
    <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3 no-print">
      <i class="fa-solid fa-chart-line text-blue-400"></i> تقرير الفترة
    </h2>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-6 no-print">
      <div>
        <label class="block text-zinc-300 mb-2">من تاريخ</label>
        <input type="date" id="dateFrom" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white">
      </div>
      <div>
        <label class="block text-zinc-300 mb-2">إلى تاريخ</label>
        <input type="date" id="dateTo" class="w-full bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3 text-white">
      </div>
      <div class="flex items-end">
        <button onclick="showReport()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition">
          <i class="fa-solid fa-file-lines"></i> عرض التقرير
        </button>
      </div>
    </div>

    <div id="printArea" class="hidden bg-white text-black p-6 rounded-xl shadow-inner" dir="rtl">
      <div id="reportContent"></div>
      <div class="mt-10 text-center no-print">
        <button onclick="window.print()" class="bg-green-600 hover:bg-green-700 text-white px-10 py-4 rounded-xl font-bold text-lg shadow-lg transition flex items-center justify-center gap-3 mx-auto">
          <i class="fa-solid fa-print"></i> طباعة
        </button>
      </div>
    </div>
  </section>

  <!-- History -->
  <section class="no-print">
    <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3 px-1">
      <i class="fa-solid fa-clock-rotate-left text-blue-400"></i> سجل العمليات (من الشيت)
    </h2>
    <div id="historyList" class="space-y-4 max-h-[40vh] overflow-y-auto pr-2 pb-4"></div>
  </section>

</div>

<!-- Toast -->
<div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-4 rounded-2xl text-white font-medium shadow-2xl flex items-center gap-3 z-50 min-w-[300px] justify-center no-print">
  <i class="fa-solid fa-circle-check text-xl"></i>
  <span id="toastMsg"></span>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyeZhOfSMqt7hCceyWWtHePfCahIm-ZMkMexxtUpw_HtCXVJ-xj9bga2rjO9CXUJ0EJjQ/exec";

let balance = 0;
let records = [];

function $(id) { return document.getElementById(id); }

async function loadFromSheet(silent = false) {
  try {
    if (!silent) showToast("جاري التحميل من الشيت...", false, true);

    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    if (data.status !== "success") throw new Error(data.message || "خطأ");

    balance = data.summary.net || 0;
    records = data.transactions.map(op => ({
      type: op.type,
      amount: op.amount,
      desc: op.desc,
      date: new Date(op.date).toLocaleString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
    }));

    renderAll();
    if (!silent) showToast("تم التحميل", false);

  } catch (err) {
    console.error(err);
    showToast("تعذر الاتصال بالشيت", true);
  }
}

function updateBalanceUI() {
  $('balance').textContent = balance.toLocaleString('en-US');

  let gradient, statusText, badgeClass;

  if      (balance >= 40000) { gradient = "from-emerald-700 to-emerald-500"; statusText = "ممتاز";    badgeClass = "bg-emerald-600/40 text-emerald-100 border border-emerald-500/50"; }
  else if (balance >= 20000) { gradient = "from-emerald-600 to-emerald-400"; statusText = "جيد جداً"; badgeClass = "bg-emerald-500/30 text-emerald-100 border border-emerald-400/40"; }
  else if (balance >=  8000) { gradient = "from-amber-600   to-amber-400";   statusText = "متوسط";    badgeClass = "bg-amber-500/30 text-amber-100 border border-amber-400/40"; }
  else if (balance >=     0) { gradient = "from-red-700    to-red-500";     statusText = "منخفض";    badgeClass = "bg-red-600/40 text-red-100 border border-red-500/50"; }
  else                       { gradient = "from-rose-900   to-rose-700";    statusText = "في دين";    badgeClass = "bg-rose-800/60 text-rose-100 border border-rose-600 animate-pulse"; }

  $('balanceCard').style.background = `linear-gradient(135deg, ${gradient})`;
  $('glow').style.background = balance < 0 ? `radial-gradient(circle at 50% 30%, rgba(244,63,94,0.35), transparent 70%)` : `radial-gradient(circle at 50% 30%, rgba(255,255,255,0.15), transparent 70%)`;

  $('statusBadge').textContent = statusText;
  $('statusBadge').className = `mt-8 inline-flex items-center gap-2 px-8 py-3 rounded-full text-base font-medium ${badgeClass}`;
}

function renderHistory() {
  const cont = $('historyList');
  cont.innerHTML = records.length ? "" : '<div class="text-center py-16 text-zinc-600 text-lg">لا توجد عمليات بعد...</div>';

  records.forEach(op => {
    const isIncome = op.type === "income";
    const div = document.createElement("div");
    div.className = `flex justify-between items-center bg-zinc-900/60 border ${isIncome ? 'border-emerald-900/40' : 'border-red-900/40'} rounded-2xl p-5`;
    div.innerHTML = `
      <div class="flex-1">
        <div class="font-medium text-lg ${isIncome ? 'text-emerald-300' : 'text-red-300'}">${op.desc || 'بدون وصف'}</div>
        <div class="text-sm text-zinc-500 mt-1">${op.date}</div>
      </div>
      <div class="text-right force-latin-digits">
        <div class="text-3xl font-bold ${isIncome ? 'text-emerald-400' : 'text-red-400'}">
          ${isIncome ? '+' : '-'} ${op.amount.toLocaleString('en-US')}
        </div>
      </div>
    `;
    cont.prepend(div);
  });
}

function renderAll() {
  updateBalanceUI();
  renderHistory();
}

async function addOperation(isExpense) {
  const desc = $('desc').value.trim();
  const amount = Number($('amount').value);

  if (!desc) return highlight($('desc'));
  if (!amount || amount <= 0) return highlight($('amount'));

  const payload = {
    type: isExpense ? "expense" : "income",
    amount,
    desc,
    date: new Date().toISOString()
  };

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
  } catch (err) {
    console.warn(err);
    showToast("تم الحفظ محلياً فقط", true);
  }

  showToast(isExpense ? `تم خصم ${amount.toLocaleString('en-US')} ✓` : `تم إيداع ${amount.toLocaleString('en-US')} ✓`);

  $('desc').value = "";
  $('amount').value = "";

  // تحديث بعد 1.5 ثانية لإعطاء وقت للشيت
  setTimeout(() => loadFromSheet(true), 1500);
}

function highlight(el) {
  el.classList.add('!border-red-500', '!ring-2', '!ring-red-500/40');
  setTimeout(() => el.classList.remove('!border-red-500', '!ring-2', '!ring-red-500/40'), 1800);
  el.focus();
}

function showToast(message, isError = false, isImportant = false) {
  const toast = $('toast');
  const msg = $('toastMsg');
  msg.textContent = message;
  toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-4 rounded-2xl text-white font-medium shadow-2xl flex items-center gap-3 z-50 min-w-[280px] justify-center no-print ${isError ? 'bg-rose-700' : 'bg-emerald-600'} ${isImportant ? '!bg-amber-600' : ''}`;
  toast.classList.remove('hidden');
  setTimeout(() => {
    toast.classList.add('opacity-0', 'translate-y-6');
    setTimeout(() => toast.classList.add('hidden'), 400);
  }, 3800);
}

async function showReport() {
  const from = $('dateFrom').value;
  const to   = $('dateTo').value;
  if (!from || !to) return showToast("حدد التاريخين", true);

  try {
    const url = `${SCRIPT_URL}?from=${from}&to=${to}`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.status === "error") throw new Error(data.message);

    let html = data.totalRows ? '' : '<p class="text-center text-xl text-gray-600 py-12">لا توجد عمليات في الفترة</p>';

    if (data.totalRows) {
      html = `
        <h2 class="text-2xl font-bold text-center mb-6">تقرير الصندوق<br><small class="text-gray-600">${from} ← ${to}</small></h2>
        <table class="w-full border-collapse text-sm mb-8">
          <thead><tr class="bg-gray-200"><th class="p-3 border">التاريخ</th><th class="p-3 border">الوصف</th><th class="p-3 border text-right">إيداع</th><th class="p-3 border text-right">خصم</th></tr></thead>
          <tbody>
      `;
      data.transactions.forEach(op => {
        const isIn = op.type === "income";
        const dateStr = new Date(op.date).toLocaleString('ar-EG', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        html += `<tr class="border-b hover:bg-gray-50">
          <td class="p-3 border">${dateStr}</td>
          <td class="p-3 border">${op.desc || '-'}</td>
          <td class="p-3 border text-right ${isIn?'text-green-700 font-medium':''}">${isIn ? op.amount.toLocaleString('en-US') : '-'}</td>
          <td class="p-3 border text-right ${!isIn?'text-red-700 font-medium':''}">${!isIn ? op.amount.toLocaleString('en-US') : '-'}</td>
        </tr>`;
      });
      html += `</tbody></table>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 text-center">
        <div class="p-5 bg-green-50 rounded-xl"><div class="text-green-700">إجمالي الإيداعات</div><div class="text-3xl font-bold text-green-700">${data.summary.income.toLocaleString('en-US')}</div></div>
        <div class="p-5 bg-red-50 rounded-xl"><div class="text-red-700">إجمالي المصروفات</div><div class="text-3xl font-bold text-red-700">${data.summary.expense.toLocaleString('en-US')}</div></div>
        <div class="p-5 bg-blue-50 rounded-xl"><div class="text-blue-700">الصافي</div><div class="text-3xl font-bold ${data.summary.net>=0?'text-green-700':'text-red-700'}">${data.summary.net.toLocaleString('en-US')}</div></div>
      </div>`;
    }

    $('reportContent').innerHTML = html;
    $('printArea').classList.remove('hidden');

  } catch (err) {
    console.error(err);
    showToast("فشل جلب التقرير", true);
  }
}

// ────────────────────────────────────────────────
window.addEventListener('load', () => loadFromSheet());
$('amount').addEventListener('keypress', e => { if (e.key === 'Enter') addOperation(true); });
</script>
</body>
</html>
